name: ci

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore MbtiEnterpriseSimilarity.sln

      - name: Build
        run: dotnet build MbtiEnterpriseSimilarity.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test MbtiEnterpriseSimilarity.sln --configuration Release --no-build --collect:"XPlat Code Coverage"
